<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Image Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icons -->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container disable">
    <h2>✨ Modern Image Editor</h2>

    <div class="wrapper">
        <!-- LEFT PANEL -->
        <div class="editor-panel">

            <div class="filter">
                <label class="title">Filters</label>

                <div class="options">
                    <button id="brightness" class="active">Brightness</button>
                    <button id="saturation">Saturation</button>
                    <button id="inversion">Inversion</button>
                    <button id="grayscale">Grayscale</button>
                </div>

                <div class="slider">
                    <div class="filter-info">
                        <p class="name">Brightness</p>
                        <p class="value">100%</p>
                    </div>
                    <input type="range" value="100" min="0" max="200">
                </div>
            </div>

            <div class="rotate">
                <label class="title">Rotate & Flip</label>

                <div class="options">
                    <button id="left"><i class="bx bx-rotate-left"></i></button>
                    <button id="right"><i class="bx bx-rotate-right"></i></button>
                    <button id="horizontal"><i class='bx bx-reflect-vertical'></i></button>
                    <button id="vertical"><i class='bx bx-reflect-horizontal'></i></button>
                </div>
            </div>

        </div>

        <!-- IMAGE PREVIEW -->
        <div class="preview-img">
            <img src="image-placeholder.svg" alt="preview">
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <button class="reset-filter">Reset</button>

        <div class="row">
            <input type="file" class="file-input" accept="image/*" hidden>
            <button class="choose-img">Upload</button>
            <button class="save-img">Download</button>
        </div>
    </div>
</div>
